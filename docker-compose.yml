version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  rate-limiter:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RATE_LIMIT_ENDPOINT=/api/test
      - MAX_REQUESTS_PER_SECOND=5
    depends_on:
      - redis

volumes:
  redis-data: